# Конфигурация mpv для SwitchWave / mpv configuration for SwitchWave
# Форк Dimasick-git: приоритет русских дорожек / Dimasick-git fork: Russian track priority

keep-open
hr-seek
msg-level=all=info
save-position-on-quit
watch-later-directory=~~/watch_later
#no-resume-playback

# Приоритет языков аудиодорожек: русский, японский, английский
# Audio track language priority: Russian, Japanese, English
alang=ru,rus,jp,jpn,en,eng

# Приоритет языков субтитров: русский, японский, английский
# Subtitle language priority: Russian, Japanese, English
slang=ru,rus,en,eng

# Аппаратное декодирование через Tegra GPU / Hardware decoding via Tegra GPU
hwdec=nvtegra
hwdec-codecs=mpeg1video,mpeg2video,mpeg4,vc1,wmv3,h264,hevc,vp8,vp9,mjpeg

# Формат буфера кадра / Frame buffer format
fbo-format=rgb10_a2
hdr-compute-peak=yes
#profile=gpu-hq
gpu-shader-cache-dir=~~/shadercache

# Настройки декодировщика / Decoder settings
framedrop=vo
vd-lavc-dr=yes
vd-lavc-threads=4
#vd-lavc-skiploopfilter=all
vd-lavc-skipframe=default
#vd-lavc-framedrop=nonref
#vd-lavc-fast=yes

# Скриншоты / Screenshots
screenshot-directory=~~/screenshots
screenshot-format=jpg
screenshot-jpeg-quality=90
